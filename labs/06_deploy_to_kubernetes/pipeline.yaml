apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline

spec:
  workspaces:
    - name: pipeline-workspace

  params:
    - name: repo-url
      type: string

    - name: branch
      type: string
      default: main

    - name: build-image
      type: string

    - name: app-name
      type: string
      default: hitcounter

  tasks:

    # ---------------- INIT ----------------
    - name: init
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: pipeline-workspace

    # ---------------- CLONE ----------------
    - name: clone
      runAfter:
        - init
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: pipeline-workspace
      params:
        - name: url
          value: "$(params.repo-url)"

        - name: revision
          value: "$(params.branch)"

    # ---------------- LINT ----------------
    - name: lint
      runAfter:
        - clone
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: image
          value: python:3.9-slim

        - name: args
          value:
            - "--count"
            - "--max-complexity=10"
            - "--max-line-length=127"
            - "--statistics"

    # ---------------- TESTS ----------------
    - name: tests
      runAfter:
        - lint
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: args
          value: "-v"

    # ---------------- BUILD IMAGE ----------------
    - name: build
      runAfter:
        - tests
      taskRef:
        name: buildah
        kind: ClusterTask
      workspaces:
        - name: source
          workspace: pipeline-workspace
      params:
        - name: IMAGE
          value: "$(params.build-image)"

    # ---------------- DEPLOY ----------------
    - name: deploy
      runAfter:
        - build
      taskRef:
        name: openshift-client
        kind: ClusterTask
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) \
              --image=$(params.build-image) \
              --dry-run=client -o yaml | oc apply -f -

            oc expose deployment $(params.app-name) --port=8080 || true

            oc expose service $(params.app-name) || true

            oc get all